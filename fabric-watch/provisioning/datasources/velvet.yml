    type: postgres
    uid: velvet-pg
    url: db-velvet:5432
    user: velvet
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      database: velvet
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
