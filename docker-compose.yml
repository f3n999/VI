secrets:
  db_password:
    file: ./secrets/db_password
  jwt_secret:
    file: ./secrets/jwt_secret
  grafana_admin_password:
    file: ./secrets/grafana_admin_password
  stitch_api_key:
    file: ./secrets/stitch_api_key

x-svc: &svc
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  db-velvet:
    <<: *svc
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: velvet
      POSTGRES_DB: velvet
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db-velvet/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - data
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velvet -d velvet"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  thread-api:
    <<: *svc
    build: ./thread-api
    environment:
      DB_HOST: db-velvet
      DB_NAME: velvet
      DB_USER: velvet
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      PYTHONDONTWRITEBYTECODE: "1"
    secrets:
      - db_password
      - jwt_secret
    depends_on:
      db-velvet:
        condition: service_healthy
    networks:
      - edge
      - data
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M

  tailor-panel:
    <<: *svc
    build: ./tailor-panel
    environment:
      DB_HOST: db-velvet
      DB_NAME: velvet
      DB_USER: velvet
      DB_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    depends_on:
      db-velvet:
        condition: service_healthy
    networks:
      - edge
      - data
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://localhost:8080/')===false?1:0);"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  stitch-processor:
    <<: *svc
    build: ./stitch-processor
    environment:
      DB_HOST: db-velvet
      DB_NAME: velvet
      DB_USER: velvet
      DB_PASSWORD_FILE: /run/secrets/db_password
      API_KEY_FILE: /run/secrets/stitch_api_key
    secrets:
      - db_password
      - stitch_api_key
    depends_on:
      db-velvet:
        condition: service_healthy
    networks:
      - data
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8082/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  fabric-watch:
    <<: *svc
    build: ./fabric-watch
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SERVER_ROOT_URL: https://grafana.sl1p.local/
      GF_USERS_ALLOW_SIGN_UP: "false"
    secrets:
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - edge
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M

  reverse-proxy:
    <<: *svc
    image: nginx:alpine
    depends_on:
      - thread-api
      - tailor-panel
      - fabric-watch
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./reverse-proxy/tls:/etc/nginx/tls:ro
    networks:
      - edge
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /run
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  edge:
  data:
    internal: true

volumes:
  db-data:
  grafana-data:
