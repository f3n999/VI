name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - thread-api/Dockerfile
          - tailor-panel/Dockerfile
          - stitch-processor/Dockerfile
          - fabric-watch/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: error

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: compose config
        run: |
          mkdir -p secrets reverse-proxy/tls
          for s in db_password jwt_secret grafana_admin_password stitch_api_key grafana_db_password backup_passphrase; do
            echo dummy > "secrets/$s"
          done
          docker compose config >/dev/null

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: pip install -r thread-api/requirements-dev.txt
      - name: pytest
        run: pytest thread-api/tests -q

  build-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: secrets factices (pour compose build)
        run: |
          mkdir -p secrets reverse-proxy/tls
          for s in db_password jwt_secret grafana_admin_password stitch_api_key grafana_db_password backup_passphrase; do
            echo dummy > "secrets/$s"
          done
      - name: build images
        run: docker compose build
      - name: trivy fs (IaC + dependances, fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # legacy-vulnerable-AVANT est vulnérable PAR CONSTRUCTION (état "avant" du cas
          # d'étude, conservé pour la démo avant/après) — exclu du gate de sécurité.
          skip-dirs: legacy-vulnerable-AVANT,demande de prof
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: install trivy CLI
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.72.0/contrib/install.sh | sh -s -- -b /usr/local/bin v0.72.0
      - name: trivy image (scan de chaque image buildee, fail on HIGH/CRITICAL)
        run: |
          # Le prof demande explicitement un scan d'IMAGES (pas seulement fs).
          for img in $(docker compose images -q | sort -u); do
            echo "=== trivy image: $img ==="
            trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 "$img"
          done
